name: Main Observatorio CI Actions

on:
  push:
    paths-ignore:
      - '**/*.md'
      - '**/*.txt'
  workflow_dispatch:

permissions:
  contents: read
  issues: read
  checks: write
  pull-requests: write
  actions: read
  security-events: write
  packages: write

jobs:
  build:
    name: Build 
    uses: ./.github/workflows/build.yml
    secrets: inherit

  # Cron para mantener vivo el backend
  cron-keep-alive:
    needs: build
    name: Keep Backend Alive
    uses: ./.github/workflows/keepalive.yml
    secrets: inherit

  