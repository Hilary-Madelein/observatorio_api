name: 02 Build pipeline

on:
  workflow_dispatch:
  workflow_call:

jobs:
  build:
    permissions:
      contents: read
      issues: read
      checks: write
      pull-requests: write
    runs-on: ubuntu-latest

    steps:
      # Clonar el repositorio
      - name: Checkout repository
        uses: actions/checkout@v3

      # Configurar Node.js 14
      - name: Set up Node.js 14
        uses: actions/setup-node@v3
        with:
          node-version: 14
          cache: 'npm'

      # Instalar dependencias
      - name: Install dependencies
        run: npm install

      # Ejecutar las pruebas (si no es el script placeholder)
      - name: Run tests
        run: |
          set -euo pipefail
          node - <<'NODE'
          const pkg = require('./package.json');
          const test = (pkg.scripts && pkg.scripts.test) ? String(pkg.scripts.test) : '';
          const isPlaceholder = /no test specified/i.test(test) && /exit\s+1/.test(test);
          if (isPlaceholder) {
            console.log('Skipping placeholder tests (no test specified).');
            process.exit(0);
          }
          console.log('Running npm test...');
          NODE
          npm test

      # Subir resultados de pruebas como artefacto
      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        with:
          name: Test-Results
          path: test-results
          if-no-files-found: warn

