name: Keep backend alive

on:
  schedule:
    # Cada 5 minutos
    - cron: '*/5 * * * *'
  workflow_dispatch: 
  workflow_call: 
    
permissions:
  security-events: write
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Ping Render backend
        env:
          KEEPALIVE_URL: https://observatorio-api-fsxd.onrender.com/api/
        run: |
          set -euo pipefail
          echo "Pinging: ${KEEPALIVE_URL}"

          # Reintenta para tolerar cold starts / timeouts breves
          curl -fsS --retry 3 --retry-delay 5 --max-time 25 "${KEEPALIVE_URL}" | head -c 200 || {
            echo "Ping failed" >&2
            exit 1
          }
